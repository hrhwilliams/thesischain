  backend:
    build:
      context: .
      dockerfile: crates/end2/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://${DB_USER}:${DB_PASS}@database:${DB_PORT}/${DB_NAME}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "end2"
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
      ETH_RPC_URL: "http://anvil:8545"
      COMET_RPC_URL: "http://node0:26657"
    volumes:
      - contract_data:/shared:ro
    depends_on:
      database:
        condition: service_healthy
      otel-collector:
        condition: service_started
      # node0:
      #   condition: service_started
    networks:
      - end2-network
      - localnet

  frontend:
    build:
      context: ./crates/end2-wasm-client
    env_file:
      - .env
    networks:
      - end2-network

volumes:
  pg_data:
  contract_data:
networks:
  end2-network:
    driver: bridge
  localnet:
    driver: bridge
    ipam:
      config:
        - subnet: 192.167.10.0/24
