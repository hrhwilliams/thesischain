services:
  database:
    image: postgres:18-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    expose:
      - ${DB_PORT}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - end2-network

  nginx:
    image: nginx:1.29-trixie-otel
    restart: unless-stopped
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/ssl:/etc/ssl/certs:ro
    depends_on:
      - backend
    networks:
      - end2-network

  tempo:
    image: grafana/tempo:2.10.2
    command: ["-config.file=/etc/tempo.yaml", "-log.level=warn"]
    restart: unless-stopped
    volumes:
      - ./config/tempo.yaml:/etc/tempo.yaml:ro
    networks:
      - end2-network

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    volumes:
      - ./config/loki.yaml:/etc/loki/loki.yaml:ro
    command: ["-config.file=/etc/loki/loki.yaml", "-log.level=warn"]
    networks:
      - end2-network

  prometheus:
    image: prom/prometheus:latest
    command: ["--config.file=/etc/prometheus/prometheus.yaml", "--web.enable-remote-write-receiver", "--log.level=warn"]
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
    networks:
      - end2-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector.yaml"]
    restart: unless-stopped
    environment:
      - OTELCOL_LOG_LEVEL=warn
    volumes:
      - ./config/otel-collector.yaml:/etc/otel-collector.yaml:ro
    networks:
      - end2-network
    depends_on:
      - tempo
      - loki
      - prometheus

  tunnel:
    image: cloudflare/cloudflared
    env_file:
      - .env
    restart: unless-stopped
    command: tunnel run
    depends_on:
      - nginx
    networks:
      - end2-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    restart: unless-stopped
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - end2-network
    depends_on:
      - loki
      - prometheus
      - tempo

  anvil:
    build:
      context: ./contract
    networks:
      - end2-network
    volumes:
      - contract_data:/shared

